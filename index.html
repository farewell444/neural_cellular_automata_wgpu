<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Экосистема ботов</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #061018;
      --bg-1: #091821;
      --panel: rgba(6, 16, 24, 0.74);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #eef7f5;
      --muted: rgba(230, 244, 242, 0.72);
      --accent: #78f5bf;
      --accent-2: #66b8ff;
      --danger: #ff8aa0;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(102, 184, 255, 0.18), transparent 26%),
        radial-gradient(circle at 80% 20%, rgba(120, 245, 191, 0.16), transparent 28%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 62%, #041016);
      color: var(--text);
      font-family: "Bahnschrift", "Trebuchet MS", "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.12;
      mix-blend-mode: screen;
    }

    #world {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 340px;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 18px 18px 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .title {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1.05;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .control {
      margin-bottom: 12px;
    }

    .control label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(228, 242, 239, 0.8);
    }

    .control .value {
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }

    .control input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: #051018;
      background: linear-gradient(135deg, var(--accent), #b8fff0);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(120, 245, 191, 0.2);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button.secondary {
      color: var(--text);
      background: linear-gradient(135deg, rgba(102, 184, 255, 0.22), rgba(255, 255, 255, 0.06));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .stats {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: grid;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .stat strong {
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .legend {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
      color: rgba(232, 244, 243, 0.72);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .chip::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.9;
    }

    @media (max-width: 700px) {
      .panel {
        width: auto;
        right: 16px;
        left: 16px;
        top: 16px;
      }
    }
  </style>
</head>
<body>
  <canvas id="world"></canvas>

  <aside class="panel">
    <h1 class="title">Экосистема</h1>
    <p class="subtitle">
      Боты тратят энергию на движение, ищут еду, избегают соседей и передают свои веса потомкам с мутациями.
    </p>

    <div class="control">
      <label><span>Стартовые боты</span><span class="value" id="initialBotsValue"></span></label>
      <input id="initialBots" type="range" min="6" max="70" step="1" value="26" />
    </div>

    <div class="control">
      <label><span>Цель еды</span><span class="value" id="foodTargetValue"></span></label>
      <input id="foodTarget" type="range" min="20" max="160" step="1" value="78" />
    </div>

    <div class="control">
      <label><span>Вероятность мутации</span><span class="value" id="mutationChanceValue"></span></label>
      <input id="mutationChance" type="range" min="0.02" max="0.9" step="0.01" value="0.22" />
    </div>

    <div class="control">
      <label><span>Сила мутации</span><span class="value" id="mutationAmountValue"></span></label>
      <input id="mutationAmount" type="range" min="0.03" max="0.9" step="0.01" value="0.24" />
    </div>

    <div class="control">
      <label><span>Скорость симуляции</span><span class="value" id="speedValue"></span></label>
      <input id="speed" type="range" min="0.25" max="3" step="0.05" value="1" />
    </div>

    <div class="actions">
      <button id="toggle">Пауза</button>
      <button id="reset" class="secondary">Сбросить</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="legend">
      <span class="chip" style="color: var(--accent);">Еда</span>
      <span class="chip" style="color: var(--accent-2);">Энергия</span>
      <span class="chip" style="color: var(--danger);">Опасность</span>
    </div>
  </aside>

  <script>
    (() => {
      const canvas = document.getElementById('world');
      const ctx = canvas.getContext('2d');

      const ui = {
        initialBots: document.getElementById('initialBots'),
        foodTarget: document.getElementById('foodTarget'),
        mutationChance: document.getElementById('mutationChance'),
        mutationAmount: document.getElementById('mutationAmount'),
        speed: document.getElementById('speed'),
        initialBotsValue: document.getElementById('initialBotsValue'),
        foodTargetValue: document.getElementById('foodTargetValue'),
        mutationChanceValue: document.getElementById('mutationChanceValue'),
        mutationAmountValue: document.getElementById('mutationAmountValue'),
        speedValue: document.getElementById('speedValue'),
        toggle: document.getElementById('toggle'),
        reset: document.getElementById('reset'),
        stats: document.getElementById('stats'),
      };

      const settings = {
        initialBots: Number(ui.initialBots.value),
        foodTarget: Number(ui.foodTarget.value),
        maxBots: 140,
        minBots: 10,
        mutationChance: Number(ui.mutationChance.value),
        mutationAmount: Number(ui.mutationAmount.value),
        simulationSpeed: Number(ui.speed.value),
        foodEnergy: 24,
        startEnergy: 52,
        childEnergy: 30,
        reproductionEnergy: 74,
        reproductionCost: 10,
        foodPerChild: 2,
        metabolism: 0.55,
        moveCost: 0.018,
        maxSpeed: 78,
        acceleration: 150,
        drag: 1.55,
        senseRadius: 180,
        botRadius: 7,
        foodRadius: 4,
        maxEnergy: 120,
        maxAge: 180,
      };

      const brainSize = 7;

      const state = {
        width: 0,
        height: 0,
        dpr: Math.max(1, window.devicePixelRatio || 1),
        running: true,
        lastTime: 0,
        time: 0,
        nextBotId: 0,
        bots: [],
        foods: [],
        effects: [],
        births: 0,
        eaten: 0,
        bestScore: -Infinity,
        bestGenome: null,
        bestInfo: null,
        archiveTimer: 0,
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function randomNormal() {
        let u = 0;
        let v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
      }

      function sigmoid(value) {
        return 1 / (1 + Math.exp(-value));
      }

      function cloneGenome(genome) {
        return {
          food: genome.food.slice(),
          flee: genome.flee.slice(),
          foodBias: genome.foodBias,
          fleeBias: genome.fleeBias,
        };
      }

      function createGenome() {
        return {
          food: Array.from({ length: brainSize }, () => rand(-0.7, 0.7)),
          flee: Array.from({ length: brainSize }, () => rand(-0.7, 0.7)),
          foodBias: rand(-0.2, 0.35),
          fleeBias: rand(-0.25, 0.25),
        };
      }

      function mutateGenome(genome) {
        const next = cloneGenome(genome);
        for (let i = 0; i < next.food.length; i += 1) {
          if (Math.random() < settings.mutationChance) {
            next.food[i] = clamp(next.food[i] + randomNormal() * settings.mutationAmount, -2, 2);
          }
          if (Math.random() < settings.mutationChance) {
            next.flee[i] = clamp(next.flee[i] + randomNormal() * settings.mutationAmount, -2, 2);
          }
        }
        if (Math.random() < settings.mutationChance) {
          next.foodBias = clamp(next.foodBias + randomNormal() * settings.mutationAmount, -2, 2);
        }
        if (Math.random() < settings.mutationChance) {
          next.fleeBias = clamp(next.fleeBias + randomNormal() * settings.mutationAmount, -2, 2);
        }
        return next;
      }

      function genomeHue(genome) {
        const mix = genome.food[0] * 0.8 + genome.food[1] * 0.4 + genome.flee[0] * 0.6 + genome.flee[1] * 0.25 + genome.foodBias * 1.8;
        return ((190 + mix * 100) % 360 + 360) % 360;
      }

      function createFood(x = rand(20, Math.max(21, state.width - 20)), y = rand(20, Math.max(21, state.height - 20))) {
        return {
          x,
          y,
          pulse: rand(0, Math.PI * 2),
          size: rand(2.8, 4.4),
        };
      }

      function createBot(genome = createGenome(), x = rand(30, Math.max(31, state.width - 30)), y = rand(30, Math.max(31, state.height - 30)), energy = settings.startEnergy, generation = 1) {
        return {
          id: ++state.nextBotId,
          x,
          y,
          vx: rand(-20, 20),
          vy: rand(-20, 20),
          energy,
          age: 0,
          foodEaten: 0,
          birthsCreated: 0,
          reproductionCooldown: rand(0, 1.2),
          generation,
          genome,
          hue: genomeHue(genome),
          alive: true,
        };
      }

      function evaluateBot(bot) {
        return bot.foodEaten * 120 + bot.birthsCreated * 160 + bot.energy * 1.5 + bot.age * 0.4;
      }

      function refreshLabels() {
        ui.initialBotsValue.textContent = String(settings.initialBots);
        ui.foodTargetValue.textContent = String(settings.foodTarget);
        ui.mutationChanceValue.textContent = `${Math.round(settings.mutationChance * 100)}%`;
        ui.mutationAmountValue.textContent = settings.mutationAmount.toFixed(2);
        ui.speedValue.textContent = `${settings.simulationSpeed.toFixed(2)}x`;
      }

      function syncSettingsFromUI() {
        settings.initialBots = Number(ui.initialBots.value);
        settings.foodTarget = Number(ui.foodTarget.value);
        settings.mutationChance = Number(ui.mutationChance.value);
        settings.mutationAmount = Number(ui.mutationAmount.value);
        settings.simulationSpeed = Number(ui.speed.value);
        refreshLabels();
      }

      function resize() {
        state.dpr = Math.max(1, window.devicePixelRatio || 1);
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        canvas.width = Math.round(state.width * state.dpr);
        canvas.height = Math.round(state.height * state.dpr);
        canvas.style.width = `${state.width}px`;
        canvas.style.height = `${state.height}px`;
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

        for (let i = 0; i < state.bots.length; i += 1) {
          const bot = state.bots[i];
          bot.x = clamp(bot.x, settings.botRadius, Math.max(settings.botRadius, state.width - settings.botRadius));
          bot.y = clamp(bot.y, settings.botRadius, Math.max(settings.botRadius, state.height - settings.botRadius));
        }

        for (let i = 0; i < state.foods.length; i += 1) {
          const food = state.foods[i];
          food.x = clamp(food.x, 20, Math.max(20, state.width - 20));
          food.y = clamp(food.y, 20, Math.max(20, state.height - 20));
        }
      }

      function randomSpawnPoint(margin = 32) {
        return {
          x: rand(margin, Math.max(margin + 1, state.width - margin)),
          y: rand(margin, Math.max(margin + 1, state.height - margin)),
        };
      }

      function archiveBot(bot) {
        const score = evaluateBot(bot);
        if (score > state.bestScore) {
          state.bestScore = score;
          state.bestGenome = cloneGenome(bot.genome);
          state.bestInfo = {
            score,
            foodEaten: bot.foodEaten,
            birthsCreated: bot.birthsCreated,
            generation: bot.generation,
            hue: bot.hue,
          };
        }
      }

      function nearestTargets(bot) {
        let nearestFood = null;
        let nearestFoodDistSq = Infinity;
        for (let i = 0; i < state.foods.length; i += 1) {
          const food = state.foods[i];
          const dx = food.x - bot.x;
          const dy = food.y - bot.y;
          const distSq = dx * dx + dy * dy;
          if (distSq < nearestFoodDistSq) {
            nearestFoodDistSq = distSq;
            nearestFood = food;
          }
        }

        let nearestBot = null;
        let nearestBotDistSq = Infinity;
        for (let i = 0; i < state.bots.length; i += 1) {
          const other = state.bots[i];
          if (other === bot || !other.alive) {
            continue;
          }
          const dx = other.x - bot.x;
          const dy = other.y - bot.y;
          const distSq = dx * dx + dy * dy;
          if (distSq < nearestBotDistSq) {
            nearestBotDistSq = distSq;
            nearestBot = other;
          }
        }

        return {
          nearestFood,
          nearestFoodDistSq,
          nearestBot,
          nearestBotDistSq,
        };
      }

      function reproduce(bot, pendingChildren) {
        const requiredFood = (bot.birthsCreated + 1) * settings.foodPerChild;
        if (bot.energy < settings.reproductionEnergy) {
          return;
        }
        if (bot.foodEaten < requiredFood) {
          return;
        }
        if (bot.reproductionCooldown > 0) {
          return;
        }
        if (state.bots.length + pendingChildren.length >= settings.maxBots) {
          return;
        }

        const childEnergy = Math.min(settings.childEnergy, Math.max(18, bot.energy - settings.reproductionCost - 8));
        if (bot.energy <= childEnergy + settings.reproductionCost + 6) {
          return;
        }

        const childGenome = mutateGenome(bot.genome);
        const offsetX = rand(-18, 18);
        const offsetY = rand(-18, 18);
        const childSpawn = createBot(
          childGenome,
          clamp(bot.x + offsetX, 18, Math.max(19, state.width - 18)),
          clamp(bot.y + offsetY, 18, Math.max(19, state.height - 18)),
          childEnergy,
          bot.generation + 1
        );
        childSpawn.reproductionCooldown = 1.2 + rand(0, 0.8);
        childSpawn.vx += bot.vx * 0.2;
        childSpawn.vy += bot.vy * 0.2;

        bot.energy = Math.max(0, bot.energy - childEnergy - settings.reproductionCost);
        bot.birthsCreated += 1;
        bot.reproductionCooldown = 1.8;
        pendingChildren.push(childSpawn);
        state.births += 1;
        state.effects.push({
          kind: 'birth',
          x: bot.x,
          y: bot.y,
          hue: bot.hue,
          life: 0.45,
          duration: 0.45,
        });
      }

      function updateBot(bot, dt, pendingChildren) {
        const targets = nearestTargets(bot);
        const hunger = 1 - clamp(bot.energy / settings.maxEnergy, 0, 1);
        const foodDistance = Number.isFinite(targets.nearestFoodDistSq) ? Math.sqrt(targets.nearestFoodDistSq) : Infinity;
        const botDistance = Number.isFinite(targets.nearestBotDistSq) ? Math.sqrt(targets.nearestBotDistSq) : Infinity;
        const foodVisible = Number.isFinite(foodDistance) ? clamp(1 - foodDistance / settings.senseRadius, 0, 1) : 0;
        const botVisible = Number.isFinite(botDistance) ? clamp(1 - botDistance / settings.senseRadius, 0, 1) : 0;

        const inputs = [
          targets.nearestFood ? clamp((targets.nearestFood.x - bot.x) / settings.senseRadius, -1, 1) : 0,
          targets.nearestFood ? clamp((targets.nearestFood.y - bot.y) / settings.senseRadius, -1, 1) : 0,
          foodVisible,
          targets.nearestBot ? clamp((targets.nearestBot.x - bot.x) / settings.senseRadius, -1, 1) : 0,
          targets.nearestBot ? clamp((targets.nearestBot.y - bot.y) / settings.senseRadius, -1, 1) : 0,
          botVisible,
          hunger,
        ];

        let foodSignal = bot.genome.foodBias;
        let fleeSignal = bot.genome.fleeBias;
        for (let i = 0; i < brainSize; i += 1) {
          foodSignal += inputs[i] * bot.genome.food[i];
          fleeSignal += inputs[i] * bot.genome.flee[i];
        }

        foodSignal = sigmoid(foodSignal);
        fleeSignal = sigmoid(fleeSignal);

        const foodStrength = foodSignal * (0.22 + hunger * 0.88);
        const fleeStrength = targets.nearestBot ? fleeSignal * (0.18 + botVisible * 1.15) : 0;

        let steerX = 0;
        let steerY = 0;

        if (targets.nearestFood) {
          const dx = targets.nearestFood.x - bot.x;
          const dy = targets.nearestFood.y - bot.y;
          const len = Math.hypot(dx, dy) || 1;
          steerX += (dx / len) * foodStrength;
          steerY += (dy / len) * foodStrength;
        }

        if (targets.nearestBot) {
          const dx = bot.x - targets.nearestBot.x;
          const dy = bot.y - targets.nearestBot.y;
          const len = Math.hypot(dx, dy) || 1;
          steerX += (dx / len) * fleeStrength;
          steerY += (dy / len) * fleeStrength;
        }

        bot.vx += steerX * settings.acceleration * dt;
        bot.vy += steerY * settings.acceleration * dt;

        const drag = Math.exp(-settings.drag * dt);
        bot.vx *= drag;
        bot.vy *= drag;

        const speed = Math.hypot(bot.vx, bot.vy);
        if (speed > settings.maxSpeed) {
          const scale = settings.maxSpeed / speed;
          bot.vx *= scale;
          bot.vy *= scale;
        }

        bot.x += bot.vx * dt;
        bot.y += bot.vy * dt;
        bot.age += dt;
        bot.energy -= settings.metabolism * dt + Math.hypot(bot.vx, bot.vy) * settings.moveCost * dt;
        bot.reproductionCooldown = Math.max(0, bot.reproductionCooldown - dt);

        const radius = settings.botRadius;
        if (bot.x < radius) {
          bot.x = radius;
          bot.vx = Math.abs(bot.vx) * 0.9;
          bot.energy -= 0.6;
        } else if (bot.x > state.width - radius) {
          bot.x = state.width - radius;
          bot.vx = -Math.abs(bot.vx) * 0.9;
          bot.energy -= 0.6;
        }

        if (bot.y < radius) {
          bot.y = radius;
          bot.vy = Math.abs(bot.vy) * 0.9;
          bot.energy -= 0.6;
        } else if (bot.y > state.height - radius) {
          bot.y = state.height - radius;
          bot.vy = -Math.abs(bot.vy) * 0.9;
          bot.energy -= 0.6;
        }

        const eatRadius = settings.botRadius + settings.foodRadius + 2;
        const eatRadiusSq = eatRadius * eatRadius;
        for (let i = state.foods.length - 1; i >= 0; i -= 1) {
          const food = state.foods[i];
          const dx = food.x - bot.x;
          const dy = food.y - bot.y;
          if (dx * dx + dy * dy <= eatRadiusSq) {
            state.foods.splice(i, 1);
            bot.energy = Math.min(settings.maxEnergy, bot.energy + settings.foodEnergy);
            bot.foodEaten += 1;
            state.eaten += 1;
            state.effects.push({
              kind: 'eat',
              x: food.x,
              y: food.y,
              hue: 145,
              life: 0.25,
              duration: 0.25,
            });
            break;
          }
        }

        reproduce(bot, pendingChildren);
        archiveBot(bot);

        if (bot.energy <= 0 || bot.age > settings.maxAge) {
          bot.alive = false;
        }
      }

      function refillFood() {
        while (state.foods.length < settings.foodTarget) {
          state.foods.push(createFood());
        }
        if (state.foods.length > settings.foodTarget) {
          state.foods.length = settings.foodTarget;
        }
      }

      function ensurePopulation(dt) {
        if (state.bots.length >= settings.minBots) {
          state.archiveTimer = 0;
          return;
        }

        state.archiveTimer += dt;
        if (!state.bestGenome) {
          return;
        }

        if (state.archiveTimer >= 1.4) {
          state.archiveTimer = 0;
          const spawn = randomSpawnPoint(40);
          const child = createBot(mutateGenome(state.bestGenome), spawn.x, spawn.y, settings.startEnergy, state.bestInfo ? state.bestInfo.generation + 1 : 1);
          child.reproductionCooldown = 1.6;
          state.bots.push(child);
        }
      }

      function step(dt) {
        state.time += dt;
        refillFood();
        ensurePopulation(dt);

        const currentBots = state.bots;
        const survivors = [];
        const pendingChildren = [];

        for (let i = 0; i < currentBots.length; i += 1) {
          const bot = currentBots[i];
          if (!bot.alive) {
            continue;
          }
          updateBot(bot, dt, pendingChildren);
          if (bot.alive) {
            survivors.push(bot);
          }
        }

        for (let i = 0; i < pendingChildren.length; i += 1) {
          survivors.push(pendingChildren[i]);
        }

        state.bots = survivors;

        if (state.bots.length > settings.maxBots) {
          state.bots.sort((a, b) => evaluateBot(b) - evaluateBot(a));
          state.bots.length = settings.maxBots;
        }

        if (state.bots.length === 0) {
          if (state.bestGenome) {
            const seed = randomSpawnPoint(50);
            state.bots.push(createBot(mutateGenome(state.bestGenome), seed.x, seed.y, settings.startEnergy, state.bestInfo ? state.bestInfo.generation + 1 : 1));
          } else {
            for (let i = 0; i < settings.initialBots; i += 1) {
              const spawn = randomSpawnPoint(40);
              state.bots.push(createBot(createGenome(), spawn.x, spawn.y));
            }
          }
        }

        for (let i = state.effects.length - 1; i >= 0; i -= 1) {
          const effect = state.effects[i];
          effect.life -= dt;
          if (effect.life <= 0) {
            state.effects.splice(i, 1);
          }
        }
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, state.height);
        gradient.addColorStop(0, '#08111a');
        gradient.addColorStop(0.55, '#08131b');
        gradient.addColorStop(1, '#041016');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, state.width, state.height);

        ctx.save();
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = 'rgba(96, 168, 255, 0.08)';
        ctx.beginPath();
        ctx.arc(state.width * 0.2, state.height * 0.18, Math.min(state.width, state.height) * 0.25, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(120, 245, 191, 0.08)';
        ctx.beginPath();
        ctx.arc(state.width * 0.82, state.height * 0.23, Math.min(state.width, state.height) * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 1;
        for (let x = 0; x <= state.width; x += 48) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, state.height);
          ctx.stroke();
        }
        for (let y = 0; y <= state.height; y += 48) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(state.width, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawFoods() {
        for (let i = 0; i < state.foods.length; i += 1) {
          const food = state.foods[i];
          const pulse = Math.sin(state.time * 4 + food.pulse) * 0.35;
          const radius = food.size + pulse;
          ctx.save();
          ctx.shadowColor = 'rgba(120, 245, 191, 0.72)';
          ctx.shadowBlur = 14;
          ctx.fillStyle = '#79f6c0';
          ctx.beginPath();
          ctx.arc(food.x, food.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawEffects() {
        for (let i = 0; i < state.effects.length; i += 1) {
          const effect = state.effects[i];
          const t = 1 - clamp(effect.life / effect.duration, 0, 1);
          const alpha = 1 - t;
          const radius = effect.kind === 'birth' ? 12 + t * 26 : 8 + t * 16;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = `hsla(${effect.hue}, 90%, 68%, ${alpha})`;
          ctx.lineWidth = effect.kind === 'birth' ? 2.6 : 2;
          ctx.beginPath();
          ctx.arc(effect.x, effect.y, radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawBots() {
        for (let i = 0; i < state.bots.length; i += 1) {
          const bot = state.bots[i];
          const energyRatio = clamp(bot.energy / settings.maxEnergy, 0, 1);
          const radius = settings.botRadius + energyRatio * 3.2;
          const angle = Math.atan2(bot.vy, bot.vx);
          const ringStart = -Math.PI / 2;
          const ringEnd = ringStart + Math.PI * 2 * energyRatio;

          ctx.save();
          ctx.translate(bot.x, bot.y);
          ctx.rotate(Number.isFinite(angle) ? angle : 0);

          ctx.shadowColor = `hsla(${bot.hue}, 90%, 65%, 0.55)`;
          ctx.shadowBlur = 18;
          ctx.fillStyle = `hsla(${bot.hue}, 90%, 62%, 0.95)`;
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, Math.PI * 2);
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.lineWidth = 1.3;
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
          ctx.beginPath();
          ctx.arc(0, 0, radius + 4.2, 0, Math.PI * 2);
          ctx.stroke();

          ctx.strokeStyle = `hsla(${bot.hue}, 95%, 82%, 0.95)`;
          ctx.lineWidth = 2.1;
          ctx.beginPath();
          ctx.arc(0, 0, radius + 4.2, ringStart, ringEnd);
          ctx.stroke();

          ctx.strokeStyle = 'rgba(255, 255, 255, 0.88)';
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(radius + 8, 0);
          ctx.stroke();

          ctx.restore();
        }
      }

      function renderStats() {
        const population = state.bots.length;
        let totalEnergy = 0;
        let topGeneration = 0;
        let bestLiving = null;
        let bestLivingScore = -Infinity;

        for (let i = 0; i < state.bots.length; i += 1) {
          const bot = state.bots[i];
          totalEnergy += bot.energy;
          topGeneration = Math.max(topGeneration, bot.generation);
          const score = evaluateBot(bot);
          if (score > bestLivingScore) {
            bestLivingScore = score;
            bestLiving = bot;
          }
        }

        const averageEnergy = population > 0 ? totalEnergy / population : 0;
        const bestName = state.bestInfo
          ? `еда ${state.bestInfo.foodEaten}, рождений ${state.bestInfo.birthsCreated}, поколение ${state.bestInfo.generation}`
          : 'пока нет';

        ui.stats.innerHTML = `
          <div class="stat"><span>Популяция</span><strong>${population}</strong></div>
          <div class="stat"><span>Еды на карте</span><strong>${state.foods.length}</strong></div>
          <div class="stat"><span>Средняя энергия</span><strong>${averageEnergy.toFixed(1)}</strong></div>
          <div class="stat"><span>Съедено всего</span><strong>${state.eaten}</strong></div>
          <div class="stat"><span>Рождений всего</span><strong>${state.births}</strong></div>
          <div class="stat"><span>Максимум поколения</span><strong>${topGeneration}</strong></div>
          <div class="stat"><span>Лучший архив</span><strong>${bestName}</strong></div>
          <div class="stat"><span>Текущий лидер</span><strong>${bestLiving ? `еда ${bestLiving.foodEaten}, энергия ${bestLiving.energy.toFixed(1)}` : 'нет'}</strong></div>
        `;
      }

      function render() {
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        drawBackground();
        drawFoods();
        drawEffects();
        drawBots();
        renderStats();
      }

      function resetWorld() {
        state.running = true;
        state.lastTime = 0;
        state.time = 0;
        state.bots = [];
        state.foods = [];
        state.effects = [];
        state.births = 0;
        state.eaten = 0;
        state.bestScore = -Infinity;
        state.bestGenome = null;
        state.bestInfo = null;
        state.archiveTimer = 0;
        state.nextBotId = 0;

        for (let i = 0; i < settings.initialBots; i += 1) {
          const spawn = randomSpawnPoint(42);
          state.bots.push(createBot(createGenome(), spawn.x, spawn.y, settings.startEnergy, 1));
        }

        refillFood();
        ui.toggle.textContent = 'Пауза';
      }

      function loop(timestamp) {
        if (!state.lastTime) {
          state.lastTime = timestamp;
        }
        const rawDelta = Math.min(0.05, (timestamp - state.lastTime) / 1000);
        state.lastTime = timestamp;

        if (state.running) {
          step(rawDelta * settings.simulationSpeed);
        }

        render();
        requestAnimationFrame(loop);
      }

      ui.initialBots.addEventListener('input', syncSettingsFromUI);
      ui.foodTarget.addEventListener('input', syncSettingsFromUI);
      ui.mutationChance.addEventListener('input', syncSettingsFromUI);
      ui.mutationAmount.addEventListener('input', syncSettingsFromUI);
      ui.speed.addEventListener('input', syncSettingsFromUI);

      ui.toggle.addEventListener('click', () => {
        state.running = !state.running;
        ui.toggle.textContent = state.running ? 'Пауза' : 'Продолжить';
      });

      ui.reset.addEventListener('click', () => {
        syncSettingsFromUI();
        resetWorld();
      });

      window.addEventListener('resize', () => {
        resize();
        refillFood();
      });

      syncSettingsFromUI();
      resize();
      resetWorld();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
